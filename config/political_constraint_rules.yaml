model_id: political_binary_constraint_paper_v1
rules:
  - relation_id: gop_nominee_mutex_vance_rubio
    tier: A
    relation_type: nominee_family_mutex
    lhs_market:
      market_slug: will-jd-vance-win-the-2028-republican-presidential-nomination
      side: "YES"
    rhs_market:
      market_slug: will-marco-rubio-win-the-2028-republican-presidential-nomination
      side: "YES"
    preconditions:
      election_cycle: "2028"
      office: us_president
      party: republican
      jurisdiction: us
      resolution_family: presidential_nomination
      market_type: nominee_person
    assertion: NOT (lhs_yes AND rhs_yes)
    trade_enabled: true
    notes: Same 2028 Republican presidential nomination family. Pairwise mutex under approved nominee-person rule.

  - relation_id: gop_nominee_mutex_vance_desantis
