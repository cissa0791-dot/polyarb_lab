      side: "YES"
    preconditions:
      election_cycle: "2028"
      office: us_president
      party: republican
      jurisdiction: us
      resolution_family: presidential_nomination
      market_type: nominee_person
    assertion: NOT (lhs_yes AND rhs_yes)
    trade_enabled: true
    notes: Same 2028 Republican presidential nomination family. Trump and Vance nominee-person markets are mutually exclusive.

